<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幸运扭蛋机</title>
    <style>
        /* --- 基础设置与字体 --- */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=ZCOOL+KuaiLe&display=swap');

        :root {
            --bg-color: #FFF9F0;
            --machine-body: #FFB7B2;
            --machine-glass: #E2F0CB;
            --machine-base: #FFDAC1;
            --ball-color: #B5EAD7;
            --btn-color: #C7CEEA;
            --text-color: #6D6875;
            --gray-locked: #E0E0E0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Nunito', 'ZCOOL KuaiLe', sans-serif;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1 {
            margin-top: 20px;
            font-size: 2rem;
            color: #FF9AA2;
            text-shadow: 2px 2px 0px #FFF;
            font-family: "ZCOOL KuaiLe", "YouYuan", "Microsoft YaHei", cursive;
            font-weight: normal;
            letter-spacing: 3px;
        }

        /* --- 扭蛋机主体 --- */
        .machine-container {
            position: relative;
            margin: 30px auto;
            width: 300px;
            height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .machine-head {
            width: 280px;
            height: 280px;
            background-color: var(--machine-body);
            border-radius: 50%;
            border: 8px solid #FFF;
            box-shadow: 0 10px 20px rgba(255, 183, 178, 0.4);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: visible;
            z-index: 2;
            margin-top: 40px;
        }

        .machine-head::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 40px;
            width: 70px;
            height: 70px;
            background-color: var(--machine-body);
            border: 8px solid #FFF;
            border-radius: 50%;
            z-index: -1;
        }

        .machine-head::after {
            content: '';
            position: absolute;
            top: -20px;
            right: 40px;
            width: 70px;
            height: 70px;
            background-color: var(--machine-body);
            border: 8px solid #FFF;
            border-radius: 50%;
            z-index: -1;
        }

        .glass-window {
            width: 180px;
            height: 180px;
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.8);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            padding: 15px;
            gap: 3px;
        }

               .mini-ball {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--ball-color) 50%, #fff 50%);
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.1);
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .machine-base {
            width: 200px;
            height: 100px;
            background-color: var(--machine-base);
            border-radius: 20px 20px 40px 40px;
            margin-top: -20px;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            position: relative;
        }

        .knob {
            width: 60px;
            height: 60px;
            background-color: #FF9AA2;
            border-radius: 50%;
            border: 4px solid #FFF;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 24px;
            box-shadow: 0 4px 0 #E57373;
        }

        .knob:active {
            transform: rotate(-90deg);
            box-shadow: 0 0 0 #E57373;
            margin-top: 4px;
        }

        .knob.spinning {
            animation: spinKnob 0.5s linear infinite;
        }

        @keyframes spinKnob {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .drop-zone {
            position: absolute;
            bottom: 20px;
            width: 100px;
            height: 80px;
            background-color: rgba(0,0,0,0.1);
            border-radius: 10px 10px 30px 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .gacha-ball-drop {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #B5EAD7 50%, #fff 50%);
            border-radius: 50%;
            position: absolute;
            top: -100px;
            z-index: 10;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: none;
            cursor: pointer;
            animation: dropBall 1s cubic-bezier(0.5, 0, 1, 1) forwards;
        }

        @keyframes dropBall {
            0% { top: -100px; transform: rotate(0deg); }
            100% { top: 20px; transform: rotate(720deg); }
        }

        /* --- 底部按钮区 --- */
        .controls {
            margin-top: 40px;
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-family: "Microsoft YaHei", sans-serif;
            font-size: 1.1rem;
            font-weight: normal;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            color: white;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .btn-gacha {
            background-color: #FF9AA2;
        }

        .btn-collection {
            background-color: #C7CEEA;
            display: flex;
            align-items: center;
            gap: 8px;
        }

               /* 音乐控制按钮 */
        .music-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 50px;
            background-color: #FFB7B2;
            color: white;
            font-family: "Microsoft YaHei", sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s, background-color 0.2s;
            margin: 10px auto 20px auto; /* 居中 + 上下间距 */
            display: block; /* 独占一行 */
        }


        .music-btn:hover {
            transform: scale(1.05);
            background-color: #FF9AA2;
        }

        .music-btn.playing {
            background-color: #B5EAD7;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
            50% { box-shadow: 0 4px 20px rgba(181, 234, 215, 0.6); }
        }

        /* --- 弹窗 (Modal) --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: white;
            padding: 40px 30px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 320px;
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 5px solid var(--machine-body);
            position: relative;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-img {
            width: 150px;
            height: 150px;
            border-radius: 20px;
            margin-bottom: 20px;
            object-fit: cover;
            background-color: #f0f0f0;
        }

        .modal-title {
            font-size: 22px;
            color: #333333;
            font-family: "Microsoft YaHei", sans-serif;
            font-weight: normal;
            margin: 10px 0 20px 0;
            letter-spacing: 2px;
        }

            .modal-desc {
            color: #666666;
            font-size: 15px;
            font-family: "Microsoft YaHei", sans-serif;
            line-height: 2;
            margin-bottom: 20px;
            text-align: center;
            display: block;
            min-height: 60px;
        }



        .new-badge {
            background-color: #FFDAC1;
            color: #d68c45;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            animation: pop 0.5s infinite alternate;
            position: absolute;
            top: -15px;
            left: -15px;
            margin: 0;
            z-index: 10;
        }

        @keyframes pop {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .btn-close {
            background-color: var(--btn-color);
            color: white;
            padding: 10px 40px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            display: block;
            margin: 20px auto 0;
            width: fit-content;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* --- 隐藏奖励弹窗样式 --- */
        .secret-content, .letter-content {
            border: 5px solid #FFD700;
        }

        .password-input {
            width: 80%;
            padding: 12px;
            border: 2px solid #FFB7B2;
            border-radius: 20px;
            font-size: 1rem;
            text-align: center;
            margin: 20px 0;
            font-family: "Microsoft YaHei", sans-serif;
            outline: none;
        }

        .password-input:focus {
            border-color: #FF9AA2;
        }

        .letter-body {
            background: linear-gradient(135deg, #FFF9F0 0%, #FFE4E1 100%);
            padding: 30px;
            border-radius: 15px;
            margin: 20px 0;
            text-align: left;
            line-height: 2;
            font-family: "Microsoft YaHei", sans-serif;
            color: #6D6875;
            border: 2px dashed #FFB7B2;
        }

        .letter-body p {
            margin: 10px 0;
        }

        /* --- 图鉴页面 --- */
        .collection-page {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            z-index: 50;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            transform: translateX(100%);
            transition: transform 0.4s ease-in-out;
            font-family: "Microsoft YaHei", sans-serif;
        }

        .collection-page.active {
            transform: translateX(0);
        }

        .collection-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .collection-header h2 {
            font-family: "Microsoft YaHei", sans-serif;
            font-weight: normal;
            color: #333;
        }

        .close-collection {
            font-size: 2rem;
            cursor: pointer;
            color: var(--text-color);
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FF9AA2, #B5EAD7);
            width: 0%;
            transition: width 0.5s;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        .grid-item {
            aspect-ratio: 1;
            border-radius: 15px;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 3px solid transparent;
        }

        .grid-item:not(.locked) {
            border: 3px solid #FFB7B2;
        }

        .grid-item:not(.locked):hover {
            border: 3px solid #FF9AA2;
            transform: scale(1.05);
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .grid-item.locked {
            background-color: var(--gray-locked);
            cursor: not-allowed;
            filter: grayscale(100%);
            opacity: 0.7;
        }
        
        .grid-item.locked::after {
            content: '?';
            font-size: 2rem;
            color: #aaa;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <h1>✨ 幸运扭蛋机 ✨</h1>

    <!-- 音乐控制按钮 -->
    <button class="music-btn" id="musicBtn" onclick="toggleMusic()">🎵 音乐：关</button>

    <div class="machine-container">
        <div class="machine-head">
            <div class="glass-window" id="glassWindow">
            </div>
        </div>
        <div class="machine-base">
            <div class="knob" id="spinBtn" onclick="playSound(clickSound); spinGacha()">↻</div>
            <div class="drop-zone">
                <div class="gacha-ball-drop" id="droppedBall" onclick="openResult()"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-gacha" onclick="playSound(clickSound); spinGacha()">扭一下！</button>
        <button class="btn btn-collection" onclick="playSound(clickSound); toggleCollection(true)">
            🎁 图鉴
        </button>
    </div>

    <!-- 音效文件（修改这里的音乐链接） -->
    <audio id="bgMusic" loop>
        <source src="audio/bgm.mp3" type="audio/mpeg">
    </audio>
    <audio id="clickSound" src="audio/click.mp3"></audio>
    <audio id="spinSound" src="audio/spin.mp3"></audio>
    <audio id="dropSound" src="audio/drop.mp3"></audio>

    <!-- 结果弹窗 -->
    <div class="modal-overlay" id="resultModal">
        <div class="modal-content">
            <div id="newBadge" class="new-badge" style="display:none;">NEW! 首次获得</div>
            <img src="" alt="Item" class="modal-img" id="modalImg">
            <h2 class="modal-title" id="modalTitle">物品名称</h2>
            <p class="modal-desc" id="modalDesc">物品描述...</p>
            <button class="btn-close" onclick="playSound(clickSound); closeModal()">收下啦</button>
        </div>
    </div>

    <!-- 隐藏奖励弹窗 -->
    <div class="modal-overlay" id="secretModal">
        <div class="modal-content secret-content">
            <h2 class="modal-title">🎉 恭喜全收集！</h2>
            <p class="modal-desc">你解锁了隐藏奖励！请输入密码查看信件~</p>
            <input type="password" id="secretPassword" placeholder="输入密码" class="password-input">
            <button class="btn-close" onclick="playSound(clickSound); checkPassword()">打开信件</button>
            <button class="btn-close" onclick="playSound(clickSound); closeSecretModal()" style="background-color: #E0E0E0; color: #666;">暂不开启</button>
        </div>
    </div>

    <!-- 信件内容弹窗 -->
    <div class="modal-overlay" id="letterModal">
        <div class="modal-content letter-content">
            <h2 class="modal-title">💌 给你的信</h2>
            <div class="letter-body">
                <p>亲爱的：</p>
                <p>恭喜你收集了所有扭蛋！</p>
                <p>这封信是专门为你准备的隐藏奖励~</p>
                <p>在这里写下你想说的话吧！</p>
                <p style="text-align: right; margin-top: 30px;">—— 爱你的人</p>
            </div>
            <button class="btn-close" onclick="playSound(clickSound); closeLetterModal()">珍藏这封信</button>
        </div>
    </div>

    <!-- 图鉴页面 -->
    <div class="collection-page" id="collectionPage">
        <div class="collection-header">
            <h2>我的收藏</h2>
            <div class="close-collection" onclick="playSound(clickSound); toggleCollection(false)">&times;</div>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <p style="text-align: center; margin-bottom: 20px; color: #888;">收集进度：<span id="progressText">0/20</span></p>

        <div class="grid-container" id="collectionGrid">
        </div>
    </div>

    <script>
        // ============================================
        // 【需要修改】物品数据（20 个物品）
        // 修改 name（名称）、desc（描述）、imageUrl（图片路径）
        // ============================================
        const itemsData = [

            { id: 2, name: "风筝", desc: "清明踏青<br>割断线的风筝带走坏运气", color: "B5EAD7", imageUrl: "images/2.jpg" },
            { id: 3, name: "青梅酒", desc: "酿梅子酒<br>存初见时的春至夏小酌", color: "FFDAC1", imageUrl: "images/3.jpg" },

            { id: 15, name: "丝巾", desc: "城南的风太轻<br>丝巾跟着心飘走了", color: "90A4AE", imageUrl: "images/15.jpg" },
            { id: 16, name: "酒瓶", desc: "查案专用<br>注意撇干净茶沫子", color: "CE93D8", imageUrl: "images/16.jpg" },
            { id: 17, name: "银元", desc: "一枚袁大头<br>新时代必须银元入场的是正经地方吗", color: "81D4FA", imageUrl: "images/17.jpg" },
            { id: 18, name: "黑金卡片", desc: "Amor Fati<br>自由是你对自己说的谎言", color: "A5D6A7", imageUrl: "images/18.jpg" },
            { id: 19, name: "玉佩", desc: "君子无故，玉不去身<br>被无故抢走那就没办法了", color: "66BB6A", imageUrl: "images/19.jpg" },
            { id: 20, name: "朱批笔", desc: " 用于批阅折子<br>不限于纸折子", color: "5C6BC0", imageUrl: "images/20.jpg" }
        ];

        // ============================================
        // 【需要修改】隐藏奖励密码
        // ============================================
        const SECRET_PASSWORD = "240302";

        // ============================================
        // 游戏状态（不要修改）
        // ============================================
        let collectedIds = new Set();
        let currentResult = null;
        let isSpinning = false;
        let pityCounter = 0;
        let isMusicPlaying = false;

        // 音效和音乐元素
        const bgMusic = document.getElementById('bgMusic');
        const clickSound = document.getElementById('clickSound');
        const spinSound = document.getElementById('spinSound');
        const dropSound = document.getElementById('dropSound');
        const musicBtn = document.getElementById('musicBtn');

        // 设置音量
        bgMusic.volume = 0.5;

        // ============================================
        // 初始化（不要修改）
        // ============================================
        window.onload = function() {
            renderGlassBalls();
            renderCollectionGrid();
            updateProgress();
        };

        // ============================================
        // 音乐控制功能（不要修改）
        // ============================================
        function toggleMusic() {
            if (isMusicPlaying) {
                bgMusic.pause();
                musicBtn.innerText = '🎵 音乐：关';
                musicBtn.classList.remove('playing');
                isMusicPlaying = false;
            } else {
                bgMusic.play();
                musicBtn.innerText = '🎵 音乐：开';
                musicBtn.classList.add('playing');
                isMusicPlaying = true;
            }
        }

        // ============================================
        // 音效播放功能（不要修改）
        // ============================================
        function playSound(sound) {
            if (sound) {
                sound.currentTime = 0;
                sound.volume = 0.6;
                sound.play().catch(e => console.log('音效播放失败:', e));
            }
        }

        // ============================================
        // 渲染玻璃窗小球（不要修改）
        // ============================================
        function renderGlassBalls() {
            const container = document.getElementById('glassWindow');
            container.innerHTML = '';
            const colors = ['#FFB7B2', '#B5EAD7', '#FFDAC1', '#E2F0CB', '#C7CEEA'];
            
            itemsData.forEach((item, index) => {
                if (collectedIds.has(item.id)) return;
                
                const ball = document.createElement('div');
                ball.className = 'mini-ball';
                ball.style.setProperty('--ball-color', '#' + item.color);
                ball.style.animationDelay = (index * 0.1) + 's';
                container.appendChild(ball);
            });
        }

        // ============================================
        // 扭蛋核心逻辑（不要修改）
        // ============================================
        function spinGacha() {
            if (isSpinning) return;
            isSpinning = true;
            const knob = document.getElementById('spinBtn');
            const droppedBall = document.getElementById('droppedBall');
            knob.classList.add('spinning');
            playSound(spinSound);
            setTimeout(() => {
                knob.classList.remove('spinning');
                
                let randomIndex;
                if (pityCounter >= 2) {
                    const uncollectedItems = itemsData.filter(item => !collectedIds.has(item.id));
                    if (uncollectedItems.length > 0) {
                        const randomItem = uncollectedItems[Math.floor(Math.random() * uncollectedItems.length)];
                        randomIndex = itemsData.findIndex(item => item.id === randomItem.id);
                    } else {
                        randomIndex = Math.floor(Math.random() * itemsData.length);
                    }
                    pityCounter = 0;
                } else {
                    randomIndex = Math.floor(Math.random() * itemsData.length);
                }
                
                currentResult = itemsData[randomIndex];
                droppedBall.style.display = 'block';
                playSound(dropSound);
                droppedBall.style.background = `linear-gradient(135deg, ${currentResult.color} 50%, #fff 50%)`;
                setTimeout(() => {
                    openResult();
                    isSpinning = false;
                }, 1000);
            }, 800);
        }

        // ============================================
        // 结果弹窗（不要修改）
        // ============================================
        function openResult() {
            if (!currentResult) return;
            const modal = document.getElementById('resultModal');
            const img = document.getElementById('modalImg');
            const title = document.getElementById('modalTitle');
            const desc = document.getElementById('modalDesc');
            const badge = document.getElementById('newBadge');
            img.src = currentResult.imageUrl;
            title.innerText = currentResult.name;
            desc.innerHTML = currentResult.desc;

            const isNew = !collectedIds.has(currentResult.id);
            if (isNew) {
                collectedIds.add(currentResult.id);
                badge.style.display = 'inline-block';
                renderCollectionGrid();
                updateProgress();
                checkFullCollection();
                renderGlassBalls();
                pityCounter = 0;
            } else {
                badge.style.display = 'none';
                pityCounter++;
            }
            modal.classList.add('active');
            setTimeout(() => {
                document.getElementById('droppedBall').style.display = 'none';
            }, 300);
        }

        function closeModal() {
            document.getElementById('resultModal').classList.remove('active');
            currentResult = null;
        }

        // ============================================
        // 图鉴功能（不要修改）
        // ============================================
        function toggleCollection(show) {
            const page = document.getElementById('collectionPage');
            if (show) {
                page.classList.add('active');
                renderCollectionGrid();
                updateProgress();
            } else {
                page.classList.remove('active');
            }
        }

        function renderCollectionGrid() {
            const grid = document.getElementById('collectionGrid');
            grid.innerHTML = '';
            itemsData.forEach(item => {
                const isCollected = collectedIds.has(item.id);
                const div = document.createElement('div');
                div.className = `grid-item ${isCollected ? '' : 'locked'}`;
                if (isCollected) {
                    div.innerHTML = `<img src="${item.imageUrl}" alt="${item.name}">`;
                    div.onclick = () => showItemDetail(item);
                } else {
                    div.onclick = () => alert("还没有收集到这个扭蛋哦，快去扭一扭吧！");
                }
                grid.appendChild(div);
            });
        }

        function updateProgress() {
            const count = collectedIds.size;
            const total = itemsData.length;
            const percent = (count / total) * 100;
            document.getElementById('progressFill').style.width = `${percent}%`;
            document.getElementById('progressText').innerText = `${count}/${total}`;
        }

        function showItemDetail(item) {
            const modal = document.getElementById('resultModal');
            const img = document.getElementById('modalImg');
            const title = document.getElementById('modalTitle');
            const desc = document.getElementById('modalDesc');
            const badge = document.getElementById('newBadge');
                       img.src = item.imageUrl;
            title.innerText = item.name;
            desc.innerHTML = item.desc;
            badge.style.display = 'none';
            modal.classList.add('active');
        }

        // ============================================
        // 隐藏奖励功能（不要修改）
        // ============================================
        function checkFullCollection() {
            if (collectedIds.size >= 20) {
                const hasShownSecret = localStorage.getItem('hasShownSecret');
                if (!hasShownSecret) {
                    setTimeout(() => {
                        document.getElementById('secretModal').classList.add('active');
                    }, 1000);
                    localStorage.setItem('hasShownSecret', 'true');
                }
            }
        }

        function checkPassword() {
            const input = document.getElementById('secretPassword').value;
            if (input === SECRET_PASSWORD) {
                closeSecretModal();
                setTimeout(() => {
                    document.getElementById('letterModal').classList.add('active');
                }, 300);
            } else {
                alert('密码不对哦，再试试吧~ 💕');
                document.getElementById('secretPassword').value = '';
            }
        }

        function closeSecretModal() {
            document.getElementById('secretModal').classList.remove('active');
        }

        function closeLetterModal() {
            document.getElementById('letterModal').classList.remove('active');
        }
    </script>
</body>
</html>
